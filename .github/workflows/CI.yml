name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.10"   # supported floor (LTS)
          - "1"      # latest stable
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      # Coverage scans *all* of src/, including legacy files not yet
      # reconstructed (they have invalid-escape docstrings / parse errors).
      # Keep it non-fatal until those files are wired in; the test step above
      # is the gate. Re-enable strict coverage once src/ fully parses.
      - uses: julia-actions/julia-processcoverage@v1
        continue-on-error: true
      - uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: lcov.info

  format:
    name: JuliaFormatter
    runs-on: ubuntu-latest
    # Enforced on the reconstructed code only. Legacy src/ subdirs that are not
    # yet ported can contain parse errors, so they are excluded until wired in.
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - run: |
          julia -e 'using Pkg; Pkg.add(name="JuliaFormatter", version="2.9.0")
                    using JuliaFormatter
                    format(["src/Utils", "src/Data", "src/Backtest", "test"]; verbose=true) || exit(0)'
          git diff --exit-code
